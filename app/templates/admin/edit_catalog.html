{% extends "admin_base.html" %}

{% block content %}
<div class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="m-0" style="color: #333;"><i class="fa-solid fa-pen-to-square"></i> Edit Catalog Project</h2>
    </div>

    <div class="card shadow-sm border-0" style="border-radius: 10px; max-width: 600px;">
        <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label fw-bold">Project Title</label>
                    <input type="text" name="title" class="form-control" value="{{ project.title }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Description</label>
                    <textarea name="description" class="form-control" rows="4">{{ project.description }}</textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Current Image</label><br>
                    <img src="{{ project.image }}" alt="Current Project Image" style="max-width: 200px; border-radius: 8px; border: 1px solid #ddd; padding: 5px;">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Upload New Image (Leave blank to keep current)</label>
                    <input type="file" name="image" class="form-control" accept="image/*">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4" style="border-radius: 6px; font-weight: 600;">Save Changes</button>
                    <a href="{{ url_for('main.admin_catalog') }}" class="btn btn-light border px-4" style="border-radius: 6px; font-weight: 600;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
