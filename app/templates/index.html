{% extends "base.html" %}
{% block content %}

<section class="hero">
  <h1>Welcome to Heavenly Paint Limited</h1>
  <p>All colors start with <i>You</i></p>
</section>

<section class="product-grid">
  {% for p in products %}
  <article class="card">
    <img src="{{ url_for('main.uploaded_file', filename=p.image) if p.image else url_for('static', filename='uploads/placeholder.png') }}" alt="{{ p.name }}">
    <h3>{{ p.name }}</h3>
    <div class="price">₦{{ "{:,.2f}".format(p.price) }}</div>
    <div class="card-actions">
      <button class="btn" onclick="openColorModal({{ p.id }}, '{{ p.name }}')">Add to cart</button>
      <a href="{{ url_for('main.product', pid=p.id) }}" class="btn" style="text-decoration:none">Details</a>
    </div>
  </article>
  {% endfor %}
</section>

<div id="color-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5);">
  <div style="background:#fff; margin:100px auto; padding:20px; width:400px; border-radius:8px; position:relative;">
    <h3 id="color-modal-title">Select Color</h3>
    <input id="color-input" type="text" placeholder="Enter color name or hex (#000000)" style="width:100%; padding:6px; margin-bottom:10px;">
    <div id="color-suggestions" style="display:flex; flex-wrap:wrap; margin-bottom:10px;"></div>
    <button id="confirm-color-btn" class="btn">Add to Cart</button>
    <button onclick="closeColorModal()" class="btn" style="background:#ccc; margin-left:10px;">Cancel</button>
  </div>
</div>

{% endblock %}
