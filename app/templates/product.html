{% extends "base.html" %}
{% block content %}
<div class="product-page">
  <div class="product-left">
    <img src="{% if product.image %}
            {% if product.image.startswith('http') %}
              {{ product.image }}
            {% else %}
              {{ url_for('main.uploaded_file', filename=product.image) }}
            {% endif %}
          {% else %}
            {{ url_for('static', filename='uploads/placeholder.png') }}
          {% endif %}" 
     alt="{{ product.name }}" class="product-image">
  </div>

  <div class="product-right">
    <h2>{{ product.name }}</h2><br>
    <p>{{ product.description }}</p><br>
    <div class="price">₦{{ "{:,.2f}".format(product.price) }}</div><br><br>
    <div class="rating-box">
      <h3>Rate this product</h3>
      <div id="star-widget" class="star-widget" data-pid="{{ product.id }}" tabindex="0" aria-label="Rate product">
        <button class="star" data-value="1" aria-label="1 star">☆</button>
        <button class="star" data-value="2" aria-label="2 stars">☆</button>
        <button class="star" data-value="3" aria-label="3 stars">☆</button>
        <button class="star" data-value="4" aria-label="4 stars">☆</button>
        <button class="star" data-value="5" aria-label="5 stars">☆</button>
      </div>
      <textarea id="rating-comment" placeholder="Leave a comment (optional)"></textarea>
      <input type="text" id="order-ref" placeholder="Order reference (optional)">
      <button id="submit-rating" class="btn">Submit Rating</button>
      <div id="rating-feedback" role="status"></div>
      <div class="rating-summary">
        <p>Average: <span id="avg-rating"></span></p>
        <p>Total: <span id="total-ratings">0</span></p>
      </div>
    </div>

    <div class="rating-chart">
      <canvas id="ratingsPie" width="300" height="300"></canvas>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}" defer></script>

{% endblock %}
