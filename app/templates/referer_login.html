{% extends "base.html" %}
{% block content %}

<div class="login-page">
    <h2 style="text-align:center;">Referrer Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div style="
              padding: 12px; 
              margin-bottom: 20px; 
              border-radius: 5px; 
              text-align: center; 
              font-weight: bold;
              {% if category == 'danger' or category == 'error' %}
                  background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;
              {% elif category == 'success' %}
                  background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;
              {% else %}
                  background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba;
              {% endif %}
          ">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('main.referer_login') }}">

        <div class="form-group">
            <label for="whatsapp">WhatsApp Number</label>
            <input 
                type="text" 
                name="whatsapp_number" 
                id="whatsapp" 
                placeholder="e.g. 2348012345678" 
                required
            >
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; font-size: 0.9em;">
        Don't have an account? <a href="{{ url_for('main.apply_referer') }}" style="font-weight: bold; text-decoration: none;">Apply Here</a>
    </p>
</div>

{% endblock %}
