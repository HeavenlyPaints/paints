{% extends "staff_base.html" %}
{% block content %}

<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px;">
    <h2>Meticulous Staff's Profile</h2>
    <a href="{{ url_for('main.staff_dashboard') }}" class="btn" style="background-color: #6c757d; color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px;">&larr; Back to Dashboard</a>
</div>

<div style="display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; padding: 0 10px;">
    
    <div class="dashboard-card" style="flex: 1; min-width: 300px; border-top: 4px solid #007bff; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; color:#bbbbbb;"><i class="fa-solid fa-user-pen" style= "color:teal;"></i> Personal Details</h3>
        
        <div style="text-align: center; margin: 20px 0;">
            {% if staff.profile_image %}
                <img src="{% if staff.profile_image.startswith('data:') %}{{ staff.profile_image }}{% else %}{{ url_for('static', filename=staff.profile_image) }}{% endif %}" 
                     style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff;">
            {% else %}
                <img src="{{ url_for('static', filename='default_avatar.png') }}" 
                     style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #ccc;">
            {% endif %}
        </div>
        
        <form method="POST" action="{{ url_for('main.staff_update_info') }}" enctype="multipart/form-data">
            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Update Photo:</label>
            <input type="file" name="profile_image" accept="image/*" style="width: 100%; margin-bottom: 20px;">
            
            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Full Name:</label>
            <input type="text" name="name" value="{{ staff.name }}" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;">
            
            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Username:</label>
            <input type="text" name="username" value="{{ staff.username }}" required style="width: 100%; padding: 10px; margin-bottom: 25px; border: 1px solid #ccc; border-radius: 4px;">

            <button type="submit" class="btn" style="width: 38%; background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold;">Commit Changes</button>
        </form>
    </div>

    <div class="dashboard-card" style="flex: 1; min-width: 300px; border-top: 4px solid #dc3545; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <h3 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; color:#ff0011;"><i class="fa-solid fa-lock" style= "color:teal;"></i> Security settings</h3>
        
        <form method="POST" action="{{ url_for('main.staff_change_password') }}">
            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Current Password:</label>
            <input type="password" name="current_password" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">New Password:</label>
            <input type="password" name="new_password" minlength="6" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px;">Confirm New Password:</label>
            <input type="password" name="confirm_password" minlength="6" required style="width: 100%; padding: 10px; margin-bottom: 25px; border: 1px solid #ccc; border-radius: 4px;">

            <button type="submit" class="btn" style="width: 38%; background-color: #dc3545; color: white; padding: 12px; border: none; border-radius: 4px; font-weight: bold;">Change Password</button>
        </form>
    </div>

</div>
{% endblock %}
